# ============================================================
# 2026 世界杯冠军预测系统 — Docker Compose
# 后端 FastAPI : 8001
# 前端 Streamlit: 8501
# ============================================================
version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: worldcup-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: worldcup-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Docker 内部通信：前端通过容器名访问后端
      - BACKEND_URL=http://backend:8001
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
