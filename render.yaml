databases:
  - name: worldcup-postgres
    plan: free
    region: oregon

services:
  # ── Backend: FastAPI ──
  - type: web
    name: worldcup-backend
    env: python
    plan: free
    autoDeployTrigger: off
    healthCheckPath: /health
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: python scripts/init_database.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FOOTBALL_DATA_API
        sync: false
      - key: API_FOOTBALL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: OPENAI_MODEL
        value: glm-4-flash
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-postgres
          property: connectionString

  # ── Frontend: Streamlit Dashboard ──
  - type: web
    name: worldcup-frontend
    env: python
    plan: free
    autoDeployTrigger: off
    healthCheckPath: /_stcore/health
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: streamlit run debug_dashboard.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: BACKEND_URL
        value: https://worldcup-backend-k2sn.onrender.com
